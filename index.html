<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Радио</title>

<link rel="stylesheet" href="https://player.radioheart.ru/css/app.css">

<style>
body{
    margin:0;
    padding:15px;
    background:#fff;
    color:#000;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
}

/* КОНТЕЙНЕР */
.container{
    width:900px;
}

/* БЛОК */
.block{
    background:#fff;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

/* РЯД */
.radio-row{
    display:flex;
    gap:15px;
    align-items:flex-start;
    position:relative;
    z-index:5;
}

/* ПЛЕЕР */
#radioheart-player{
    width:400px;
}

/* БАННЕР */
.banner{
    width:300px;
    height:50px;
    border-radius:12px;
    overflow:hidden;
}

.banner img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* МЕНЮ */
.side-panel{
    width:150px;
    display:flex;
    flex-direction:column;
    gap:10px;
    position:relative;
    z-index:10;
}

/* КНОПКА */
.group-btn{
    background:#DB7093;
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    color:#fff;
}

/* ВЫПАДАЮЩЕЕ МЕНЮ */
.link-menu{
    display:none;
    flex-direction:column;
    gap:8px;
    background:#fff;
    padding:12px;
    border-radius:12px;

    position:absolute;
    top:60px;
    left:0;

    z-index:9999;

    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* ССЫЛКИ */
.link-menu a{
    color:#DB7093;
    text-decoration:none;
    padding:8px;
    background:#fff;
    border-radius:6px;
    border:1px solid #ddd;
}

/* ЧАТ */
.chat-block{
    margin-top:20px;
}

.chat-block iframe{
    width:100%;
    height:450px;
    border:none;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="container">
<div class="block">

    <div class="radio-row">

        <!-- ПЛЕЕР -->
        <div id="radioheart-player"
             class="extra-elegant"
             data-stream="https://listen.myrh.ru/id085314"
             data-autostart="false"
             data-volume="0.5">

            <div class="play-pause-container">
                <div class="current-song marquee"></div>
                <div class="play"></div>
                <div class="pause hidden"></div>
                <div class="volume"></div>
                <div class="mutecontrol active"></div>
            </div>
        </div>

        <!-- БАННЕР -->
        <div class="banner">
            <img src="https://raw.githubusercontent.com/testradio73/radio-zolushkamusics/refs/heads/main/image.gif"
                 alt="banner">
        </div>

        <!-- МЕНЮ -->
        <div class="side-panel">

            <button class="group-btn" onclick="toggleMenu()">
                МЕНЮ
            </button>

            <div class="link-menu" id="linkMenu">

                <a href="https://vk.com/zolushkamusics" target="_blank">
                    VK группа Music Club Золушка
                </a>

                <a href="https://vk.com/zolushkamusics?w=club198633668" target="_blank">
                    Информация
                </a>

            </div>

        </div>

    </div>

    <!-- ЧАТ -->
    <div class="chat-block">
        <iframe src="//4at-radio.chatovod.ru/"
                frameborder="0"
                marginheight="0"
                marginwidth="0"
                width="100%"
                height="450">
        </iframe>
    </div>

</div>
</div>

<script src="https://player.radioheart.ru/js/app.js"></script>

<script>
let menuTimer;

function toggleMenu(){
    const menu = document.getElementById('linkMenu');

    if(menu.style.display === 'flex'){
        menu.style.display = 'none';
        return;
    }

    menu.style.display = 'flex';

    clearTimeout(menuTimer);

    menuTimer = setTimeout(()=>{
        menu.style.display = 'none';
    },7000);
}

document.addEventListener('click', function(event){
    const menu = document.getElementById('linkMenu');
    const button = document.querySelector('.group-btn');

    if(!menu.contains(event.target) && !button.contains(event.target)){
        menu.style.display = 'none';
    }
});
</script>

</body>
</html>
