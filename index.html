<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Радио</title>

<link rel="stylesheet" href="https://player.radioheart.ru/css/app.css">

<style>
body{
    margin:0;
    padding:15px;
    background:#fff;
    color:#000;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
}

/* КОНТЕЙНЕР */
.container{
    width:900px;
}

/* ОСНОВНОЙ БЛОК */
.block{
    background:#fff;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    position:relative;
}

/* ВЕРХНЯЯ ПАНЕЛЬ */
.top-panel{
    display:flex;
    justify-content:flex-end;
    position:relative;
    z-index:999999;
    margin-bottom:15px;
}

/* КНОПКА */
.group-btn{
    background:#DB7093;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    color:#fff;
    font-size:16px;
}

/* ВЫПАДАЮЩЕЕ МЕНЮ */
.link-menu{
    display:none;
    flex-direction:column;
    gap:8px;

    background:#A9A9A9;
    padding:12px;
    border-radius:12px;

    position:absolute;
    top:55px;
    right:0;

    min-width:280px;

    z-index:99999999;

    box-shadow:0 0 20px rgba(0,0,0,0.25);
}

/* ССЫЛКИ */
.link-menu a{
    color:#DB7093;
    text-decoration:none;
    padding:10px;
    background:#fff;
    border-radius:6px;
    border:1px solid #ddd;
    font-weight:bold;
    transition:0.2s;
}

.link-menu a:hover{
    background:#f3f3f3;
}

/* РЯД */
.radio-row{
    display:flex;
    gap:15px;
    align-items:flex-start;
}

/* ЛЕВАЯ ЧАСТЬ */
#mainContent{
    display:flex;
    gap:15px;
}

/* ПЛЕЕР */
#radioheart-player{
    width:400px;
}

/* БАННЕР */
.banner{
    width:300px;
    height:50px;
    border-radius:12px;
    overflow:hidden;
}

.banner img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* iframe сайта */
#siteFrame{
    display:none;
    width:100%;
    height:520px;
    border:none;
    border-radius:12px;
    background:#fff;
}

/* БЛОК ЧАТА */
.chat-block{
    margin-top:20px;
    display:flex;
    justify-content:center;
}

/* КНОПКА ЧАТА */
.chat-open-btn{
    display:inline-block;
    background:#DB7093;
    color:#fff;
    text-decoration:none;
    padding:15px 35px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    transition:0.2s;
}

.chat-open-btn:hover{
    background:#c85f84;
}
</style>
</head>

<body>

<div class="container">
<div class="block">

    <!-- КНОПКА МЕНЮ -->
    <div class="top-panel">

        <button class="group-btn" onclick="toggleMenu()">
            МЕНЮ
        </button>

        <!-- ВЫПАДАЮЩЕЕ МЕНЮ -->
        <div class="link-menu" id="linkMenu">

            <!-- ОТКРЫТЬ VOLNOREZ -->
            <a href="#"
               onclick="openSite(event)">
                volnorez \ music-club-zolushka
            </a>

            <!-- чат+плеер -->
            <a href="#"
               onclick="goBack(event)">
                 чат+плеер
            </a>

            <!-- VK -->
            <a href="https://vk.com/zolushkamusics"
               target="_blank">
                VK группа Music Club Золушка
            </a>

            <!-- ИНФОРМАЦИЯ -->
            <a href="https://vk.com/zolushkamusics?w=club198633668"
               target="_blank">
                Информация
            </a>

        </div>

    </div>

    <div class="radio-row">

        <!-- ПЛЕЕР + БАННЕР -->
        <div id="mainContent">

            <!-- ПЛЕЕР -->
            <div id="radioheart-player"
                 class="extra-elegant"
                 data-stream="https://listen.myrh.ru/id085314"
                 data-autostart="false"
                 data-volume="0.5">

                <div class="play-pause-container">
                    <div class="current-song marquee"></div>
                    <div class="play"></div>
                    <div class="pause hidden"></div>
                    <div class="volume"></div>
                    <div class="mutecontrol active"></div>
                </div>

            </div>

            <!-- БАННЕР -->
            <div class="banner">
                <img src="https://raw.githubusercontent.com/testradio73/radio-zolushkamusics/refs/heads/main/image.gif"
                     alt="banner">
            </div>

        </div>

        <!-- iframe -->
        <iframe id="siteFrame"></iframe>

    </div>

    <!-- ЧАТ -->
    <div class="chat-block" id="chatBlock">

        <a href="https://4at-radio.chatovod.ru/"
           target="_blank"
           class="chat-open-btn">
            ОТКРЫТЬ ЧАТ
        </a>

    </div>

</div>
</div>

<!-- VK Bridge -->
<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

<script>
vkBridge.send('VKWebAppInit');
</script>

<!-- RadioHeart -->
<script src="https://player.radioheart.ru/js/app.js"></script>

<script>
let menuTimer;

/* ОТКРЫТЬ / ЗАКРЫТЬ МЕНЮ */
function toggleMenu(){

    const menu = document.getElementById('linkMenu');

    if(menu.style.display === 'flex'){

        menu.style.display = 'none';
        return;

    }

    menu.style.display = 'flex';

    clearTimeout(menuTimer);

    menuTimer = setTimeout(()=>{

        menu.style.display = 'none';

    },7000);

}

/* ОТКРЫТЬ VOLNOREZ */
function openSite(event){

    event.preventDefault();

    /* скрываем плеер и баннер */
    document.getElementById('mainContent').style.display = 'none';

    /* скрываем чат */
    document.getElementById('chatBlock').style.display = 'none';

    /* показываем iframe */
    const frame = document.getElementById('siteFrame');

    frame.style.display = 'block';

    /* загружаем сайт */
    frame.src = 'https://m.volnorez.com/music-club-zolushka';

    /* закрываем меню */
    document.getElementById('linkMenu').style.display = 'none';

}

/* ВЕРНУТЬСЯ ОБРАТНО */
function goBack(event){

    event.preventDefault();

    /* показываем плеер */
    document.getElementById('mainContent').style.display = 'flex';

    /* показываем чат */
    document.getElementById('chatBlock').style.display = 'flex';

    /* скрываем iframe */
    const frame = document.getElementById('siteFrame');

    frame.style.display = 'none';

    frame.src = '';

    /* закрываем меню */
    document.getElementById('linkMenu').style.display = 'none';

}

/* ЗАКРЫТИЕ МЕНЮ ПРИ КЛИКЕ ВНЕ */
document.addEventListener('click', function(event){

    const menu = document.getElementById('linkMenu');
    const button = document.querySelector('.group-btn');

    if(
        !menu.contains(event.target) &&
        !button.contains(event.target)
    ){

        menu.style.display = 'none';

    }

});
</script>

</body>
</html>
